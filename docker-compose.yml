services:

  frontend:
    build: ./frontend
    ports:
      - "5175:5175"
    depends_on:
      - backend

  admin:
    build: ./admin
    ports:
      - "5174:5174"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env